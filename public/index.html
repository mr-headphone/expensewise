<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseWise – Login</title>

  <!-- CSS Files -->
  <link rel="stylesheet" href="css/normalize.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <!-- The whole page is inside this div -->
  <div class="auth-page">

    <!-- Logo / Brand Area -->
    <div class="auth-brand">
      <span class="brand-icon">💰</span>
      <h1 class="brand-name">ExpenseWise</h1>
      <p class="brand-tagline">Take control of your spending</p>
    </div>

    <!-- White Card with the form -->
    <div class="auth-card">

      <!-- Tab Buttons to switch between Login and Register -->
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <!-- Error / Success message shows here -->
      <div class="alert" id="authAlert"></div>

      <!-- ── LOGIN FORM ─────────────────────────────────── -->
      <form class="auth-form active" id="loginForm" novalidate>
        
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input
            type="password"
            id="loginPassword"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn btn--primary btn--full" id="loginBtn">
          Login
        </button>

      </form>

      <!-- ── REGISTER FORM ──────────────────────────────── -->
      <form class="auth-form" id="registerForm" novalidate>

        <div class="form-group">
          <label for="registerName">Full Name</label>
          <input
            type="text"
            id="registerName"
            placeholder="Jane Doe"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label for="registerEmail">Email Address</label>
          <input
            type="email"
            id="registerEmail"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input
            type="password"
            id="registerPassword"
            placeholder="At least 6 characters"
            autocomplete="new-password"
            required
          />
        </div>

        <button type="submit" class="btn btn--primary btn--full" id="registerBtn">
          Create Account
        </button>

      </form>

    </div>
  </div>

  <!-- Load the auth JavaScript -->
  <script type="module" src="js/auth.js"></script>
</body>
</html>
